<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Join Gabriel Services and contribute to operations, communication, and workflow support across service teams."
    />
    <link rel="canonical" href="https://www.gabo.services/careers.html" />
    <link rel="alternate" hreflang="en" href="https://www.gabo.services/careers.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.gabo.services/careers.html" />
    <title data-i18n="careersPageTitle">Careers | Gabriel Services</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="stylesheet" href="./assets/gabo-io-chatbot.css" />
    <script src="./assets/theme.js"></script>
    <script src="./assets/i18n.js"></script>
  </head>
  <body>
    <header>
      <div class="container topbar">
        <a class="brand serif" href="./" data-i18n="brand">Gabriel Services</a>
        <nav class="main-nav">
          <a href="about.html" data-i18n="about">About</a>
          <a href="careers.html" data-i18n="careers">Careers</a>
          <a href="contact.html" data-i18n="contact">Contact</a>
          <div class="language-switcher" aria-label="Language selector" data-i18n-aria-label="languageSelector">
            <button
              id="language-toggle"
              type="button"
              class="toggle-btn"
              aria-label="Switch to Spanish"
            >
              ES
            </button>
          </div>
          <button id="theme-toggle" class="toggle-btn">Dark</button>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1 data-i18n="careersTitle">Careers</h1>
        <p data-i18n="careersIntro">
          Apply to support operations, communication, and service delivery
          workflows across all service domains.
        </p>
        <form
          id="careers-application-form"
          method="post"
          action="https://careers.gabo.services/api/careers"
          data-secure-gateway="careers"
          data-page-tinyml="careers"
          data-upstream-path="https://careers.gabo.services/api/careers"
          data-repo-id="CAREERS"
          data-asset-id="redesigned-octo-meme-careers"
          data-src="careers.html"
        >
          <div class="form-honeypot career-honeypot" aria-hidden="true" hidden inert>
            <label for="career-website-url">Website URL</label>
            <input
              id="career-website-url"
              name="website_url"
              type="text"
              tabindex="-1"
              autocomplete="off"
              data-tinyml-honeypot="true"
            />
          </div>
          <div class="form-grid">
            <div class="floating-field">
              <label for="career-full-name" data-i18n="fullName">Full Name</label>
              <input id="career-full-name" name="fullName" autocomplete="name" required minlength="2" />
            </div>
            <div class="floating-field">
              <label for="career-email-address" data-i18n="emailAddress">Email Address</label>
              <input
                id="career-email-address"
                name="emailAddress"
                type="email"
                autocomplete="email"
                required
              />
            </div>
            <div class="floating-field">
              <label for="career-country-code" data-i18n="countryCode">Country Code</label>
              <input
                id="career-country-code"
                name="countryCode"
                type="tel"
                inputmode="numeric"
                pattern="[0-9]+"
                data-numeric-only
                autocomplete="tel-country-code"
              />
            </div>
            <div class="floating-field">
              <label for="career-contact-number" data-i18n="contactNumber">Contact Number</label>
              <input
                id="career-contact-number"
                name="contactNumber"
                type="tel"
                inputmode="numeric"
                pattern="[0-9]+"
                data-numeric-only
                autocomplete="tel-national"
              />
            </div>
            <div class="floating-field">
              <label for="career-city" data-i18n="city">City</label>
              <input id="career-city" name="city" />
            </div>
            <div class="floating-field">
              <label for="career-state-province" data-i18n="stateProvince">State/Province</label>
              <input id="career-state-province" name="stateProvince" />
            </div>
            <div class="floating-field">
              <label for="career-country-zip-code" data-i18n="countryZipCode">Country Zip Code</label>
              <input
                id="career-country-zip-code"
                name="countryZipCode"
                type="text"
                inputmode="numeric"
                pattern="[0-9]+"
                data-numeric-only
                autocomplete="postal-code"
              />
            </div>
            <div class="floating-field">
              <label for="career-availability" data-i18n="availabilityLabel">Availability</label>
              <input id="career-availability" name="availability" />
            </div>
            <div>
              <label for="career-area-interest" data-i18n="areaInterestLabel">Area of Interest</label>
              <select id="career-area-interest" name="areaInterest">
                <option data-i18n="careersOptionLogistics">Logistics</option>
                <option data-i18n="careersOptionAdministration">
                  Administration
                </option>
                <option data-i18n="careersOptionCustomerRelations">
                  Customer Relations
                </option>
                <option data-i18n="careersOptionItSupport">IT Support</option>
              </select>
            </div>
            <div class="floating-field">
              <label for="career-resume-link" data-i18n="resumeLinkLabel">Resume/Profile link</label>
              <input id="career-resume-link" name="resumeLink" type="url" />
            </div>
            <div>
              <label for="career-education-level" data-i18n="educationLevelLabel">Education Level</label>
              <select id="career-education-level" name="educationLevel">
                <option data-i18n="educationOptionHighSchool">
                  High School
                </option>
                <option data-i18n="educationOptionAssociate">Associate</option>
                <option data-i18n="educationOptionBachelor">Bachelor</option>
                <option data-i18n="educationOptionMaster">Master</option>
                <option data-i18n="educationOptionDoctorate">Doctorate</option>
                <option data-i18n="educationOptionCertified">Certified</option>
              </select>
            </div>
            <div
              class="entry-group full-row"
              data-repeatable-group
              data-field-name="Experience"
            >
              <div class="entry-group-header">
                <label data-i18n="experienceLabel">Experience</label>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row experience-entry-row">
                  <div class="floating-field entry-floating-field">
                    <label data-i18n="placeholderAddExperienceEntry">Add experience entry</label>
                    <input
                      name="experience[]"
                      data-i18n-placeholder="placeholderAddExperienceEntry"
                      placeholder="Add experience entry"
                    />
                  </div>
                  <div class="entry-select-field">
                    <label>
                      <span data-i18n="experienceLevelLabel">Experience Level</span>
                      <select name="experienceLevels[]" data-experience-level-select>
                        <option data-i18n="experienceLevelEntryLevel">Entry Level</option>
                        <option data-i18n="experienceLevelJunior">Junior</option>
                        <option data-i18n="experienceLevelIntermediate">Intermediate</option>
                        <option data-i18n="experienceLevelAdvanced">Advanced</option>
                        <option data-i18n="experienceLevelSenior">Senior</option>
                        <option data-i18n="experienceLevelExpert">Expert</option>
                        <option data-i18n="experienceLevelEngineer">Engineer</option>
                        <option data-i18n="experienceLevelCLevel">C Level</option>
                      </select>
                    </label>
                  </div>
                </div>
              </div>
              <div class="entry-group-actions">
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-add
                >
                  <span data-i18n="addSkill">Add +</span>
                </button>
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-remove
                >
                  <span data-i18n="removeSkill">Remove -</span>
                </button>
              </div>
            </div>
            <div
              class="entry-group full-row"
              data-repeatable-group
              data-field-name="Languages"
            >
              <div class="entry-group-header">
                <label data-i18n="languagesLabel">Languages</label>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row floating-field entry-floating-field">
                  <label data-i18n="placeholderAddLanguageEntry">Add language entry</label>
                  <input
                    name="languages[]"
                    data-i18n-placeholder="placeholderAddLanguageEntry"
                    placeholder="Add language entry"
                  />
                </div>
              </div>
              <div class="entry-group-actions">
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-add
                >
                  <span data-i18n="addSkill">Add +</span>
                </button>
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-remove
                >
                  <span data-i18n="removeSkill">Remove -</span>
                </button>
              </div>
            </div>
            <div
              class="entry-group full-row"
              data-repeatable-group
              data-field-name="Skills"
            >
              <div class="entry-group-header">
                <label data-i18n="skillsLabel">Skills</label>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row floating-field entry-floating-field">
                  <label data-i18n="placeholderAddSkillEntry">Add skill entry</label>
                  <input
                    name="skills[]"
                    data-i18n-placeholder="placeholderAddSkillEntry"
                    placeholder="Add skill entry"
                  />
                </div>
              </div>
              <div class="entry-group-actions">
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-add
                >
                  <span data-i18n="addSkill">Add +</span>
                </button>
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-remove
                >
                  <span data-i18n="removeSkill">Remove -</span>
                </button>
              </div>
            </div>
            <div
              class="entry-group full-row"
              data-repeatable-group
              data-field-name="Projects"
            >
              <div class="entry-group-header">
                <label data-i18n="projectsLabel">Projects</label>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row floating-field entry-floating-field">
                  <label data-i18n="placeholderAddProjectEntry">Add project entry</label>
                  <input
                    name="projects[]"
                    data-i18n-placeholder="placeholderAddProjectEntry"
                    placeholder="Add project entry"
                  />
                </div>
              </div>
              <div class="entry-group-actions">
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-add
                >
                  <span data-i18n="addSkill">Add +</span>
                </button>
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-remove
                >
                  <span data-i18n="removeSkill">Remove -</span>
                </button>
              </div>
            </div>
            <div
              class="entry-group full-row"
              data-repeatable-group
              data-field-name="Education"
            >
              <div class="entry-group-header">
                <label data-i18n="educationLabel">Education</label>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row floating-field entry-floating-field">
                  <label data-i18n="placeholderAddEducationEntry">Add education entry</label>
                  <input
                    name="education[]"
                    data-i18n-placeholder="placeholderAddEducationEntry"
                    placeholder="Add education entry"
                  />
                </div>
              </div>
              <div class="entry-group-actions">
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-add
                >
                  <span data-i18n="addSkill">Add +</span>
                </button>
                <button
                  class="btn ghost entry-btn"
                  type="button"
                  data-repeat-remove
                >
                  <span data-i18n="removeSkill">Remove -</span>
                </button>
              </div>
            </div>
            <div class="entry-group best-contact-time full-row">
              <label data-i18n="bestContactTime">Best Time to Contact You</label>
              <div class="best-contact-row">
                <div class="floating-field">
                  <label for="career-best-contact-date" data-i18n="bestContactDateLabel">Best contact date</label>
                  <input
                    id="career-best-contact-date"
                    name="bestContactDate"
                    type="date"
                    aria-label="Best contact date"
                    data-i18n-aria-label="bestContactDateLabel"
                  />
                </div>
                <div class="floating-field">
                  <label for="career-best-contact-time" data-i18n="bestContactTimeLabel">Best contact time</label>
                  <input
                    id="career-best-contact-time"
                    name="bestContactTime"
                    type="time"
                    aria-label="Best contact time"
                    data-i18n-aria-label="bestContactTimeLabel"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="floating-field floating-field-textarea">
            <label for="career-message" data-i18n="careerMessagePrompt">Tell us about YOU</label>
            <textarea
              id="career-message"
              name="message"
              data-i18n-placeholder="careerMessagePrompt"
              placeholder="Tell us about YOU"
              required
              minlength="8"
            ></textarea>
          </div>
          <div class="form-actions">
            <button
              class="btn primary"
              type="submit"
              data-i18n="submitApplication"
            >
              Submit Application</button
            ><button class="btn ghost" type="reset" data-i18n="clearForm">
              Clear Form
            </button>
          </div>
        </form>
      </div>
    </main>
    <script src="./assets/footer.js"></script>
    <script src="./careers/tiny-ml.js"></script>
    <script src="./careers/secure-submit.js"></script>
    <script src="./assets/main.js"></script>
    <script src="./assets/gabo-io-chatbot.js"></script>
</body>
</html>
