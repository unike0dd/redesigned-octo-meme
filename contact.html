<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contacta a Gabriel Services para soporte, incorporación, proyectos y oportunidades de colaboración."
      data-i18n-content="contactMetaDescription"
    />
    <link rel="canonical" href="https://www.gabo.services/contact.html" />
    <link rel="alternate" hreflang="en" href="https://www.gabo.services/contact.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.gabo.services/contact.html" />
    <title data-i18n="contactTitle">Contacto</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="stylesheet" href="./assets/gabo-io-chatbot.css" />
    <script src="./assets/theme.js"></script>
    <script src="./assets/i18n.js"></script>
  </head>
  <body>
    <header>
      <div class="container topbar">
        <a class="brand serif" href="./" data-i18n="brand">Gabriel Services</a>
        <nav class="main-nav">
          <a href="about.html" data-i18n="about">Acerca de</a>
          <a href="services.html" data-i18n="services">Services</a>
          <a href="careers.html" data-i18n="careers">Carreras</a>
          <a href="contact.html" data-i18n="contact">Contacto</a>
          <div
            class="language-switcher"
            aria-label="Language selector"
            data-i18n-aria-label="languageSelector"
          >
            <button
              id="language-toggle"
              type="button"
              class="toggle-btn"
              aria-label="Switch to Spanish"
            >
              ES
            </button>
          </div>
          <button id="theme-toggle" class="toggle-btn">Oscuro</button>
        </nav>
      </div>
    </header>

    <main class="section contact-page">
      <div class="container">
        <h1 data-i18n="contact">Contacto</h1>
        <p data-i18n="contactIntro">
          Describe the aptitudes, objectives, goals, and expectations you are seeking.
        </p>
        <!-- CONTACT FORM – final layout -->
        <section class="contact-form-wrapper" aria-labelledby="contact-request-title">
          <form
            id="contactForm"
            class="contact-form"
            action="https://contacto.gabo.services/api/contact"
            data-contact-endpoint-url="https://contacto.gabo.services/api/contact"
            data-asset-id="redesigned-octo-meme-contact"
            data-repo-id="CONTACTO"
            method="post"
            autocomplete="on"
            data-contact-endpoint="true"
            data-contact-form="true"
            data-page-tinyml="contact"
            data-source-path="contact.html"
            data-asset-source="gabo-services-static-contact-form"
          >
            <h2 id="contact-request-title" data-i18n="contactRequestTitle">Contact Request</h2>

            <div class="form-trap" aria-hidden="true">
              <label for="website" data-i18n="honeypotWebsiteLabel">Sitio web</label>
              <input
                id="website"
                name="website"
                type="text"
                tabindex="-1"
                autocomplete="off"
                data-tinyml-honeypot="true"
              />
            </div>

            <input type="hidden" name="fullName" data-contact-full-name />
            <input type="hidden" name="message" data-contact-message />

            <div class="form-row two-col">
              <div class="form-control">
                <input id="contact-first-name" name="firstName" autocomplete="given-name" placeholder=" " required />
                <label for="contact-first-name" data-i18n="firstNameLabel">First Name</label>
              </div>
              <div class="form-control">
                <input id="contact-last-name" name="lastName" autocomplete="family-name" placeholder=" " required />
                <label for="contact-last-name" data-i18n="lastNameLabel">Last Name</label>
              </div>
            </div>

            <div class="form-control">
              <input id="contact-email-address" name="emailAddress" type="email" autocomplete="email" placeholder=" " required />
              <label for="contact-email-address" data-i18n="emailAddress">Email Address</label>
            </div>

            <div class="form-row two-col">
              <div class="form-control">
                <input id="contact-country-code" name="countryCode" type="tel" inputmode="numeric" pattern="[0-9]+" data-numeric-only autocomplete="tel-country-code" placeholder=" " />
                <label for="contact-country-code" data-i18n="countryCode">Country Code</label>
              </div>
              <div class="form-control">
                <input id="contact-number" name="contactNumber" type="tel" inputmode="numeric" pattern="[0-9]+" data-numeric-only autocomplete="tel-national" placeholder=" " />
                <label for="contact-number" data-i18n="contactNumber">Contact Number</label>
              </div>
            </div>

            <div class="form-row two-col">
              <div class="form-control">
                <input id="contact-city" name="city" autocomplete="address-level2" placeholder=" " />
                <label for="contact-city" data-i18n="city">City</label>
              </div>
              <div class="form-control">
                <input id="contact-state-province" name="stateProvince" autocomplete="address-level1" placeholder=" " />
                <label for="contact-state-province" data-i18n="stateProvince">State / Province</label>
              </div>
            </div>

            <div class="form-control">
              <input id="contact-country-zip-code" name="countryZipCode" inputmode="numeric" pattern="[0-9]+" data-numeric-only autocomplete="postal-code" placeholder=" " />
              <label for="contact-country-zip-code" data-i18n="countryZipCode">Country Zip Code</label>
            </div>

            <div class="form-row two-col">
              <div class="form-control">
                <input id="contact-best-date" name="bestContactDate" type="date" placeholder=" " />
                <label for="contact-best-date" data-i18n="bestContactDateLabel">Best Contact Date</label>
              </div>
              <div class="form-control">
                <input id="contact-best-time" name="bestContactTime" type="time" placeholder=" " />
                <label for="contact-best-time" data-i18n="bestContactTimeLabel">Best Contact Time</label>
              </div>
            </div>

            <h3 data-i18n="inquiryAboutTitle">
              Tell us your expectation about the Remote Assistant’s expertise, knowledge and abilities
            </h3>

            <div id="dynamicGroups" class="dynamic-groups" data-contact-dynamic-groups></div>

            <div class="form-control">
              <textarea id="contact-expectations" name="expectations" placeholder=" " required minlength="8"></textarea>
              <label for="contact-expectations" data-i18n="expectationsLabel">
                Describe what do you expect from your candidates / applicants
              </label>
            </div>

            <p id="contact-status" class="form-status security-form-note" data-contact-status role="status" aria-live="polite"></p>

            <div class="form-actions">
              <button type="submit" class="btn primary submit-btn" data-contact-submit data-i18n="contactRequestButtonLabel">
                Send Request
              </button>
              <button type="reset" class="btn ghost" data-i18n="clearForm">Clear Form</button>
            </div>
          </form>
        </section>
      </div>
    </main>
    <script src="./assets/footer.js"></script>
    <script src="./assets/main.js"></script>
    <script src="./assets/gabo-io-chatbot.js"></script>
    <script src="./contact/tiny-ml.js"></script>
    <script src="./contact/secure-submit.js"></script>
</body>
</html>
