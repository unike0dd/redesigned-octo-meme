<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contacta a Gabriel Services para soporte, incorporación, proyectos y oportunidades de colaboración."
    />
    <meta
      name="description"
      content="Contacta a Gabriel Services para soporte, incorporación, proyectos y oportunidades de colaboración."
    />
    <title data-i18n="contactTitle">Contacto</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script src="./assets/theme.js"></script>
    <script src="./assets/i18n.js"></script>
  </head>
  <body>
    <header>
      <div class="container topbar">
        <a class="brand serif" href="./" data-i18n="brand">Gabriel Services</a>
        <nav class="main-nav">
          <a href="about.html" data-i18n="about">Acerca de</a
          ><a href="careers.html" data-i18n="careers">Carreras</a
          ><a href="contact.html" data-i18n="contact">Contacto</a
          ><a href="learning.html" data-i18n="learning">Aprendizaje</a>
          <div class="language-switcher" aria-label="Language selector" data-i18n-aria-label="languageSelector">
            <button
              type="button"
              class="toggle-btn"
              data-language-option="en"
              aria-label="Switch to English" data-i18n-aria-label="switchToEnglish"
            >
              EN
            </button>
            <button
              type="button"
              class="toggle-btn"
              data-language-option="es"
              aria-label="Switch to Spanish" data-i18n-aria-label="switchToSpanish"
            >
              ES
            </button>
          </div>
          <button id="theme-toggle" class="toggle-btn">Oscuro</button>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1 data-i18n="contact">Contacto</h1>
        <p data-i18n="contactIntro">
          Ponte en contacto para soporte, incorporación, proyectos y
          oportunidades de colaboración.
        </p>
        <form>
          <div class="form-grid">
            <div><label data-i18n="fullName">Nombre completo</label><input /></div>
            <div>
              <label data-i18n="emailAddress">Dirección de correo electrónico</label
              ><input type="email" />
            </div>
            <div>
              <label data-i18n="countryCode">Código de país</label>
              <input
                type="tel"
                inputmode="numeric"
                pattern="[0-9]+"
                data-numeric-only
                autocomplete="tel-country-code"
              />
            </div>
            <div>
              <label data-i18n="contactNumber">Número de contacto</label>
              <input
                type="tel"
                inputmode="numeric"
                pattern="[0-9]+"
                data-numeric-only
                autocomplete="tel-national"
              />
            </div>
            <div><label data-i18n="city">Ciudad</label><input /></div>
            <div>
              <label data-i18n="stateProvince">Estado/Provincia</label
              ><input />
            </div>
            <div>
              <label data-i18n="spaceSuiteApt">Espacio/Suite/Apartamento</label
              ><input />
            </div>
            <div>
              <label data-i18n="countryZipCode">Código postal del país</label>
              <input
                type="text"
                inputmode="numeric"
                pattern="[0-9]+"
                data-numeric-only
                autocomplete="postal-code"
              />
            </div>
            <div class="entry-group best-contact-time">
              <label data-i18n="bestContactTime"
                >Mejor hora para contactarte</label
              >
              <div class="best-contact-row">
                <input type="date" aria-label="Mejor fecha de contacto" />
                <input type="time" aria-label="Mejor hora de contacto" />
              </div>
            </div>
          </div>
          <label data-i18n="messageLabel">Mensaje</label><textarea></textarea>
          <h3 data-i18n="inquiryAboutTitle">Consulta sobre Asistente Remoto</h3>
          <div class="form-grid inquiry-grid">
            <div
              class="entry-group"
              data-repeatable-group
              data-field-name="Habilidades"
            >
              <div class="entry-group-header">
                <label data-i18n="skillsLabel">Habilidades</label>
                <div class="entry-group-actions">
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-add
                  >
                    <span data-i18n="addSkill">Agregar +</span>
                  </button>
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-remove
                  >
                    <span data-i18n="removeSkill">Eliminar -</span>
                  </button>
                </div>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row">
                  <input
                    data-i18n-placeholder="placeholderAddSkillEntry"
                    placeholder="Agregar habilidad"
                  />
                </div>
              </div>
            </div>
            <div
              class="entry-group"
              data-repeatable-group
              data-field-name="Área de interés"
            >
              <div class="entry-group-header">
                <label data-i18n="areaInterestLabel">Área de interés</label>
                <div class="entry-group-actions">
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-add
                  >
                    <span data-i18n="addSkill">Agregar +</span>
                  </button>
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-remove
                  >
                    <span data-i18n="removeSkill">Eliminar -</span>
                  </button>
                </div>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row">
                  <input
                    data-i18n-placeholder="placeholderAddAreaInterestEntry"
                    placeholder="Agregar área de interés"
                  />
                </div>
              </div>
            </div>
            <div
              class="entry-group"
              data-repeatable-group
              data-field-name="Nivel de experiencia"
            >
              <div class="entry-group-header">
                <label data-i18n="experienceLevelLabel">Nivel de experiencia</label>
                <div class="entry-group-actions">
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-add
                  >
                    <span data-i18n="addSkill">Agregar +</span>
                  </button>
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-remove
                  >
                    <span data-i18n="removeSkill">Eliminar -</span>
                  </button>
                </div>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row">
                  <input
                    data-i18n-placeholder="placeholderAddExperienceEntry"
                    placeholder="Agregar nivel de experiencia"
                  />
                </div>
              </div>
            </div>
            <div
              class="entry-group"
              data-repeatable-group
              data-field-name="Educación"
            >
              <div class="entry-group-header">
                <label data-i18n="educationLabel">Educación</label>
                <div class="entry-group-actions">
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-add
                  >
                    <span data-i18n="addSkill">Agregar +</span>
                  </button>
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-remove
                  >
                    <span data-i18n="removeSkill">Eliminar -</span>
                  </button>
                </div>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row">
                  <input
                    data-i18n-placeholder="placeholderAddEducationEntry"
                    placeholder="Agregar educación"
                  />
                </div>
              </div>
            </div>
            <div
              class="entry-group"
              data-repeatable-group
              data-field-name="Idiomas"
            >
              <div class="entry-group-header">
                <label data-i18n="languagesLabel">Idiomas</label>
                <div class="entry-group-actions">
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-add
                  >
                    <span data-i18n="addSkill">Agregar +</span>
                  </button>
                  <button
                    class="btn ghost entry-btn"
                    type="button"
                    data-repeat-remove
                  >
                    <span data-i18n="removeSkill">Eliminar -</span>
                  </button>
                </div>
              </div>
              <div class="entry-list" data-repeat-list>
                <div class="entry-row">
                  <input
                    data-i18n-placeholder="placeholderAddLanguageEntry"
                    placeholder="Agregar idioma"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit" data-i18n="submitContact">
              Enviar</button
            ><button class="btn ghost" type="reset" data-i18n="clearForm">
              Limpiar formulario
            </button>
          </div>
        </form>
      </div>
    </main>
    <script src="./assets/footer.js"></script>
    <script src="./assets/main.js"></script>
  </body>
</html>
