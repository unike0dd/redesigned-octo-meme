<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>gabo io — OPS AI Chatbot</title>
    <style>
      :root {
        --clr-primary: #00c4ff;
        --clr-accent: #ff3bdb;
        --clr-bg: #ffffff;
        --clr-tx: #333333;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--clr-bg);
        color: var(--clr-tx);
      }

      #chatbot-container {
        width: 300px;
        height: 540px;
        background: #251541;
        border: 2px solid var(--clr-accent);
        border-radius: 18px;
        box-shadow: 0 8px 32px #0006;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #chatbot-header {
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--clr-primary) 0%, var(--clr-accent) 100%);
        color: #fff;
        font-weight: 700;
        font-size: 1.1rem;
        padding: 0.85rem 1rem;
      }

      #chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        background: #1b0e2d;
        color: #eee;
        font-size: 0.94rem;
      }

      .chat-msg {
        margin: 0.5rem 0;
        max-width: 90%;
        line-height: 1.4;
        word-wrap: break-word;
      }

      .user {
        margin-left: auto;
        background: var(--clr-primary);
        color: #000;
        padding: 0.55rem 0.75rem;
        border-radius: 14px 14px 0 14px;
      }

      .bot {
        margin-right: auto;
        background: #321b53;
        color: #fff;
        padding: 0.55rem 0.75rem;
        border-radius: 14px 14px 14px 0;
      }

      #chatbot-form-container {
        background: #220f3a;
        border-top: 1px solid var(--clr-accent);
        padding: 0.7rem;
      }

      #chatbot-input-row {
        display: flex;
        gap: 0.6rem;
      }

      #chatbot-input {
        flex: 1;
        background: #2b1347;
        border: 1px solid #ffffff22;
        border-radius: 8px;
        color: #fff;
        font-size: 0.95rem;
        padding: 0.65rem 0.7rem;
        outline: none;
      }

      #chatbot-input:focus {
        border-color: var(--clr-primary);
      }

      #chatbot-input::placeholder {
        color: #bfbfbf;
      }

      #chatbot-send {
        background: var(--clr-accent);
        border: none;
        color: #fff;
        font-weight: 700;
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
      }

      #chatbot-send:hover {
        transform: translateY(-1px);
        opacity: 0.95;
      }

      #chatbot-send:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      @media (max-width: 480px) {
        #chatbot-container {
          height: 75vh;
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div id="chatbot-container" role="dialog" aria-modal="true" aria-label="gabo io OPS AI Chatbot">
      <div id="chatbot-header">
        <span>gabo io</span>
      </div>

      <div id="chat-log" aria-live="polite"></div>

      <div id="chatbot-form-container">
        <form id="chatbot-input-row" autocomplete="off">
          <div style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">
            <label for="chatbot-website">Website</label>
            <input id="chatbot-website" name="website" type="text" autocomplete="off" tabindex="-1" aria-hidden="true" />
          </div>

          <input id="chatbot-input" type="text" placeholder="Type your message..." required maxlength="256" />

          <button id="chatbot-send" type="submit" aria-label="Send message">Send</button>
        </form>
      </div>
    </div>

    <script src="./chatbot/embed.js"></script>
</body>
</html>
