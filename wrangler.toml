name = "contact-api-gabo-services"
main = "contact/repo-worker.js"
compatibility_date = "2026-05-09"
workers_dev = true

# Custom domain route required for the GitHub Pages contact form.
routes = [
  { pattern = "contact-api.gabo.services", custom_domain = true }
]

# This Worker is the executable Contact API Gateway Worker for GitHub Pages.
# Deploy it on the proxied custom domain contact-api.gabo.services so browser
# requests to https://contact-api.gabo.services/api/contact are handled by
# Cloudflare instead of static GitHub Pages.

[vars]
CONTACT_CF_TINYML_URL = "https://contacto.gabo.services/__ops/contact/tinyml"
