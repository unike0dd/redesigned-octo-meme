name = "contacto-gabo-services-intake"
main = "contact/intake-worker.js"
compatibility_date = "2026-05-10"
workers_dev = true

# Public Contact Intake Worker for the repository Contact form.
# Custom domain route: https://contacto.gabo.services
# Private downstream delivery must use only the CONTACT_BRIDGE service binding
# configured in Cloudflare. Do not forward Contact intake by public URL.
routes = [
  { pattern = "contacto.gabo.services", custom_domain = true }
]
