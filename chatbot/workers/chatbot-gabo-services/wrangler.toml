name = "chatbot-gabo-services"
main = "src/index.js"
compatibility_date = "2026-05-18"
workers_dev = false

[[routes]]
pattern = "chatbot.gabo.services/*"
zone_name = "gabo.services"

[vars]
PUBLIC_WORKER_ORIGIN = "https://chatbot.gabo.services"
ALLOWED_ORIGINS_JSON = "[\"https://www.gabo.services\",\"https://gabo.services\"]"
ALLOWED_METHODS_JSON = "[\"POST\",\"OPTIONS\"]"
ALLOWED_HEADERS_JSON = "[\"content-type\",\"accept\",\"x-gabo-integrity-sha256\",\"x-gabo-client\",\"x-gabo-session-id\"]"
EXPOSE_HEADERS_JSON = "[\"x-gabo-chatbot-gateway\",\"x-gabo-integrity-verified\"]"
MAX_BODY_CHARS = "24000"
MAX_MESSAGE_CHARS = "1200"
MAX_WIKI_CHARS = "8000"
MAX_RISK_SCORE = "60"
CHATBOT_REPO_CONTRACT_JSON = '{"contractName":"gabo-io-chatbot-repo-contract","contractVersion":"io-pro-chatbot-v1","publicWorker":{"origin":"https://chatbot.gabo.services","chatApi":"/api/chat","healthApi":"/health"},"repo":{"allowedOrigins":["https://www.gabo.services","https://gabo.services"],"clientName":"gabo-io","repoSync":"io-pro-chatbot-v1","assetId":"redesigned-octo-meme-chatbot"},"cors":{"allowCredentials":false,"allowedMethods":["POST","OPTIONS"],"allowedRequestHeaders":["content-type","accept","x-gabo-integrity-sha256","x-gabo-client","x-gabo-session-id","x-gabo-repo-sync","x-ops-asset-id"],"exposedResponseHeaders":["x-gabo-chatbot-gateway","x-gabo-integrity-verified","x-gabo-repo-sync-verified"],"maxAgeSeconds":86400},"repoRequestHeaders":{"Content-Type":"application/json","Accept":"application/json","X-Gabo-Client":"gabo-io","X-Gabo-Repo-Sync":"io-pro-chatbot-v1","X-Ops-Asset-Id":"redesigned-octo-meme-chatbot","X-Gabo-Integrity-SHA256":"<sha256>","X-Gabo-Session-Id":"<session>"},"repoRequestBody":{"requiredFields":["chatbot","message","lang","wikiContext","page","sessionId","honeypot","leadContext","integrity"],"canonicalIntegrityFields":["chatbot","message","lang","wikiContext","sessionId"]},"limits":{"maxBodyChars":24000,"maxMessageChars":1200,"maxWikiChars":8000,"maxRiskScore":60},"security":{"requiresInternalSecret":true,"internalSecretBindingName":"IO_PRO","browserMustNeverSendSecret":true,"verifyIntegrityAfterSanitizer":true,"blockFilledHoneypot":true,"blockPaymentCardLikeData":true,"blockMaliciousHtml":true,"blockProgrammingCode":true,"runGuardAfterSanitizer":true,"genericErrorsOnly":true},"blockedBrowserHeaders":["authorization","cookie","x-api-key","x-worker-secret","x-shared-secret","x-gabo-internal-secret","io-pro","io_pro","IO_PRO"],"blockedPublicRoutes":["/api/voice","/api/tts","/__repo/handshake","/debug","/models","/internal"]}'

[[services]]
binding = "graymatter"
service = "graymatter"

