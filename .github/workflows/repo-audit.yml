name: Repo Audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install audit tools
        run: |
          npm install -g htmlhint prettier@3.7.4

      - name: Lint HTML
        run: htmlhint "**/*.html"

      - name: Formatting check
        run: prettier --check "**/*.{html,css,js,yml,yaml}"
